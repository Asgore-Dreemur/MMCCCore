name: NuGet Push

on:
  push:
    branches: [ "main" ]
jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 4.7.3

    - name: Build and Pack
      run: |
        dotnet build --configuration Release
